<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Game Hub</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  background: #1a1a2e;
  font-family: 'Segoe UI', sans-serif;
  overflow: hidden;
}
#menu {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 50px;
}
h1 {
  color: #fff;
  font-size: 42px;
  text-shadow: 0 4px 20px rgba(0,0,0,0.3);
  letter-spacing: 2px;
}
.menu-items {
  display: flex;
  gap: 40px;
  flex-wrap: wrap;
  justify-content: center;
}
.card {
  width: 260px;
  height: 300px;
  background: rgba(255,255,255,0.05);
  border-radius: 16px;
  cursor: pointer;
  transition: all 0.3s ease;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  border: 2px solid rgba(255,255,255,0.1);
  text-decoration: none;
  color: #fff;
  padding: 30px;
}
.card:hover {
  transform: translateY(-8px);
  background: rgba(255,255,255,0.1);
  border-color: rgba(255,255,255,0.3);
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}
.icon { font-size: 72px; }
.label { font-size: 22px; font-weight: bold; }
.desc { font-size: 13px; color: rgba(255,255,255,0.5); text-align: center; }
.footer { color: rgba(255,255,255,0.2); font-size: 13px; }

.game-container {
  display: none;
  position: relative;
}
.game-container.active {
  display: flex;
  align-items: center;
  justify-content: center;
}
.game-container iframe {
  border: none;
}
#backBtn {
  position: fixed;
  top: 16px;
  left: 16px;
  background: rgba(0,0,0,0.4);
  border: 2px solid rgba(255,255,255,0.2);
  border-radius: 8px;
  padding: 8px 18px;
  color: #fff;
  font-size: 14px;
  cursor: pointer;
  z-index: 100;
  transition: background 0.2s;
  font-family: 'Segoe UI', sans-serif;
}
#backBtn:hover { background: rgba(255,255,255,0.2); }
#volBtn {
  position: fixed;
  top: 16px;
  right: 16px;
  background: rgba(0,0,0,0.4);
  border: 2px solid rgba(255,255,255,0.2);
  border-radius: 8px;
  width: 42px;
  height: 42px;
  color: #fff;
  font-size: 20px;
  cursor: pointer;
  z-index: 100;
  transition: background 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Segoe UI', sans-serif;
  display: none;
}
#volBtn:hover { background: rgba(255,255,255,0.2); }
</style>
</head>
<body>
<div id="menu">
  <h1>🎮 Game Hub</h1>
  <div class="menu-items">
    <div class="card" onclick="openGame('flappy')">
      <div class="icon">🐤</div>
      <div class="label">Flappy Bird</div>
      <div class="desc">Click để bay qua ống, ghi điểm cao nhất!</div>
    </div>
    <div class="card" onclick="openGame('caro')">
      <div class="icon">⭕</div>
      <div class="label">Caro AI</div>
      <div class="desc">Đấu trí với AI bất bại trên bàn 30x30!</div>
    </div>
  </div>
  <div class="footer">Chọn game để bắt đầu</div>
</div>

<button id="backBtn" onclick="closeGame()" style="display:none">← Quay lại</button>
<button id="volBtn" onclick="toggleVolume()" style="display:none">🔊</button>

<div id="flappyContainer" class="game-container" data-loaded="false">
  <iframe id="flappyFrame" width="296" height="520"></iframe>
</div>
<div id="caroContainer" class="game-container" data-loaded="false">
  <iframe id="caroFrame" width="700" height="620"></iframe>
</div>

<script>
let soundEnabled = true;

// Preload both games after page loads
window.addEventListener('load', () => {
  const v = Date.now();
  setTimeout(() => { document.getElementById('flappyFrame').src = 'flappy.html?v=' + v; }, 100);
  setTimeout(() => { document.getElementById('caroFrame').src = 'caro.html?v=' + v; }, 500);
});

function openGame(name) {
  document.getElementById('menu').style.display = 'none';
  document.getElementById('backBtn').style.display = 'block';
  document.getElementById('volBtn').style.display = 'flex';

  const id = name + 'Container';
  const other = name === 'flappy' ? 'caroContainer' : 'flappyContainer';

  document.getElementById(other).classList.remove('active');
  document.getElementById(id).classList.add('active');
}

function closeGame() {
  document.getElementById('flappyContainer').classList.remove('active');
  document.getElementById('caroContainer').classList.remove('active');
  document.getElementById('backBtn').style.display = 'none';
  document.getElementById('volBtn').style.display = 'none';
  document.getElementById('menu').style.display = 'flex';
}

function toggleVolume() {
  soundEnabled = !soundEnabled;
  document.getElementById('volBtn').textContent = soundEnabled ? '🔊' : '🔇';
  try {
    const active = document.querySelector('.game-container.active iframe');
    if (active) active.contentWindow.postMessage({ type: 'toggleSound', enabled: soundEnabled }, '*');
  } catch(e) {}
}

document.addEventListener('keydown', e => {
  if (e.key === 'm' || e.key === 'M') {
    const active = document.querySelector('.game-container.active');
    if (active) { e.preventDefault(); toggleVolume(); }
  }
});
</script>
</body>
</html>
