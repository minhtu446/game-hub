<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Hub</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  background: #1a1a2e;
  font-family: 'Segoe UI', sans-serif;
  overflow: hidden;
  flex-direction: column;
}

#menu { text-align: center; }
#menu h1 {
  color: #FFD54F;
  font-size: 48px;
  margin-bottom: 40px;
  text-shadow: 0 4px 8px rgba(0,0,0,0.3);
}
.menu-btn {
  display: block;
  width: 320px;
  padding: 18px 0;
  margin: 14px auto;
  font-size: 22px;
  font-weight: bold;
  color: #fff;
  background: rgba(255,255,255,0.08);
  border: 2px solid rgba(255,255,255,0.15);
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
}
.menu-btn:hover {
  background: rgba(255,255,255,0.18);
  transform: scale(1.03);
  border-color: rgba(255,255,255,0.3);
}
.menu-btn:focus { outline: 2px solid #FFD54F; }
.menu-btn .shortcut {
  display: inline-block;
  background: rgba(255,255,255,0.15);
  padding: 2px 10px;
  border-radius: 4px;
  font-size: 13px;
  margin-left: 10px;
  vertical-align: middle;
}

.game-container { display: none; }
.game-container.visible { display: block; }

#flappyCanvas {
  image-rendering: pixelated;
  image-rendering: crisp-edges;
  border: 4px solid #5c3a1e;
  box-shadow: 0 0 0 2px #3a2510, 0 8px 32px rgba(0,0,0,0.5);
  cursor: pointer;
  max-width: 90vw;
  max-height: 85vh;
  width: auto;
  height: auto;
}

#caroCanvas {
  border-radius: 8px;
  cursor: pointer;
  box-shadow: 0 0 40px rgba(0,0,0,0.5);
  max-width: 90vw;
  max-height: 85vh;
  width: auto;
  height: auto;
}

.footer {
  position: fixed;
  bottom: 16px;
  left: 0;
  right: 0;
  text-align: center;
  color: rgba(255,255,255,0.4);
  font-size: 13px;
  pointer-events: none;
  z-index: 100;
}
.footer span { margin: 0 4px; }
.caro-size-btn {
  background: rgba(255,255,255,0.08);
  border: 2px solid rgba(255,255,255,0.2);
  border-radius: 12px;
  color: #fff;
  font-size: 20px;
  font-weight: bold;
  padding: 24px 40px;
  cursor: pointer;
  transition: all 0.3s;
  font-family: 'Segoe UI', sans-serif;
  line-height: 1.5;
}
.caro-size-btn:hover {
  background: rgba(255,255,255,0.15);
  border-color: #FFD54F;
  transform: translateY(-4px);
}
</style>
</head>
<body>

<div id="menu">
  <h1>Game Hub</h1>
  <button class="menu-btn" data-game="flappy">
    Flappy Bird <span class="shortcut">F</span>
  </button>
  <button class="menu-btn" data-game="caroAI">
    Caro AI <span class="shortcut">C</span>
  </button>
  <button class="menu-btn" data-game="caroOnline">
    Đấu Online <span class="shortcut">O</span>
  </button>
</div>

<div id="flappyContainer" class="game-container">
  <canvas id="flappyCanvas"></canvas>
</div>

  <div id="caroContainer" class="game-container">
    <div id="caroMenu" style="text-align:center;padding:40px">
      <!-- Screen 1: Size selection (AI) -->
      <div id="caroSizeS">
        <h2 style="color:#FFD54F;font-size:36px;margin-bottom:20px">Caro AI - Chọn kích thước</h2>
        <div style="display:flex;flex-wrap:wrap;gap:16px;justify-content:center">
          <button class="caro-size-btn" data-size="5" data-win="3">5x5<br><span style="font-size:14px;opacity:0.7">3 ô thắng</span></button>
          <button class="caro-size-btn" data-size="10" data-win="4">10x10<br><span style="font-size:14px;opacity:0.7">4 ô thắng</span></button>
          <button class="caro-size-btn" data-size="20" data-win="5">20x20<br><span style="font-size:14px;opacity:0.7">5 ô thắng</span></button>
        </div>
      </div>
      <!-- Screen 2: Online menu -->
      <div id="caroOnline" style="display:none">
        <h2 style="color:#FFD54F;font-size:36px;margin-bottom:30px">Đấu Online</h2>
        <div style="display:flex;flex-wrap:wrap;gap:16px;justify-content:center">
          <button class="caro-size-btn" id="caroCreateBtn">Tạo trận</button>
          <button class="caro-size-btn" id="caroJoinBtn">Vào trận</button>
        </div>
        <div style="margin-top:24px"><button class="caro-size-btn" id="caroBackOnline" style="padding:12px 30px;font-size:16px">Quay lại</button></div>
      </div>
      <!-- Screen 4: Create match -->
      <div id="caroCreate" style="display:none">
        <h2 style="color:#FFD54F;font-size:36px;margin-bottom:20px">Tạo trận</h2>
        <p style="color:#fff;font-size:18px;margin-bottom:8px">Mã trận của bạn:</p>
        <p id="caroCodeDisplay" style="color:#FFD54F;font-size:48px;font-weight:bold;letter-spacing:8px;margin-bottom:20px"></p>
        <p style="color:rgba(255,255,255,0.6);font-size:16px" id="caroWaitMsg">Đang chờ đối thủ kết nối...</p>
        <div style="margin-top:30px"><button class="caro-size-btn" id="caroCancelCreate" style="padding:12px 30px;font-size:16px">Hủy</button></div>
      </div>
      <!-- Screen 5: Join match -->
      <div id="caroJoin" style="display:none">
        <h2 style="color:#FFD54F;font-size:36px;margin-bottom:20px">Vào trận</h2>
        <input id="caroCodeInput" type="text" placeholder="Nhập mã trận" style="padding:14px 20px;font-size:22px;border-radius:10px;border:2px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.08);color:#fff;text-align:center;width:240px;letter-spacing:6px;text-transform:uppercase;font-weight:bold;outline:none;font-family:inherit">
        <div style="margin-top:20px;display:flex;gap:12px;justify-content:center">
          <button class="caro-size-btn" id="caroConnectBtn" style="padding:12px 30px;font-size:16px">Kết nối</button>
          <button class="caro-size-btn" id="caroBackJoin" style="padding:12px 30px;font-size:16px">Quay lại</button>
        </div>
        <p id="caroJoinError" style="color:#e53935;font-size:14px;margin-top:12px;display:none"></p>
      </div>
    </div>
    <canvas id="caroCanvas" style="display:none"></canvas>
  </div>

<div class="footer">
  <span>Ph&iacute;m tắt: F Flappy &middot; C Caro AI &middot; O Đấu Online &middot; ESC Quay lại</span>
</div>

<script>
(function() {
  let currentGame = null;

  const menu = document.getElementById('menu');
  const flappyC = document.getElementById('flappyContainer');
  const caroC = document.getElementById('caroContainer');

  function openGame(name) {
    menu.style.display = 'none';
    flappyC.style.display = 'none';
    caroC.style.display = 'none';
    if (name === 'flappy') {
      flappyC.style.display = 'block';
    } else {
      caroC.style.display = 'block';
      document.getElementById('caroMenu').style.display = '';
      var showAI = name === 'caroAI';
      document.getElementById('caroSizeS').style.display = showAI ? '' : 'none';
      document.getElementById('caroOnline').style.display = showAI ? 'none' : '';
      document.getElementById('caroCreate').style.display = 'none';
      document.getElementById('caroJoin').style.display = 'none';
    }
    currentGame = name;
  }

  function closeGame() {
    menu.style.display = 'block';
    flappyC.style.display = 'none';
    caroC.style.display = 'none';
    currentGame = null;
    window.postMessage({ type: 'closeGame' }, '*');
    document.getElementById('caroSizeS').style.display = '';
    document.getElementById('caroMenu').style.display = '';
    document.getElementById('caroOnline').style.display = 'none';
    document.getElementById('caroCreate').style.display = 'none';
    document.getElementById('caroJoin').style.display = 'none';
    document.getElementById('caroCanvas').style.display = 'none';
  }

  document.querySelectorAll('.menu-btn').forEach(function(btn) {
    btn.addEventListener('click', function() { openGame(btn.getAttribute('data-game')); });
  });

  window.addEventListener('keydown', function(e) {
    if (currentGame === null) {
      if (e.key === 'f' || e.key === 'F') { openGame('flappy'); e.preventDefault(); return; }
      if (e.key === 'c' || e.key === 'C') { openGame('caroAI'); e.preventDefault(); return; }
      if (e.key === 'o' || e.key === 'O') { openGame('caroOnline'); e.preventDefault(); return; }
    }
    if (e.key === 'Escape') { closeGame(); e.preventDefault(); return; }
  });
})();
</script>

<script>
(function() {
  const canvas = document.getElementById('flappyCanvas');
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;

  const W = 288, H = 512;
  canvas.width = W;
  canvas.height = H;

  const BIRD_X = 64;
  const PIPE_W = 52;
  let GRAVITY, FLAP, PIPE_GAP, PIPE_SPEED;

  const DIFFICULTIES = {
    easy:   { gravity: 0.35, flap: -6.5, pipeGap: 155, pipeSpeed: 1.6, label: 'EASY' },
    medium: { gravity: 0.45, flap: -7.5, pipeGap: 130, pipeSpeed: 2.2, label: 'MEDIUM' },
    hard:   { gravity: 0.55, flap: -8.5, pipeGap: 105, pipeSpeed: 2.8, label: 'HARD' },
  };
  let difficulty = 'medium';

  function applyDifficulty(d) {
    difficulty = d;
    const cfg = DIFFICULTIES[d];
    GRAVITY = cfg.gravity;
    FLAP = cfg.flap;
    PIPE_GAP = cfg.pipeGap;
    PIPE_SPEED = cfg.pipeSpeed;
  }
  applyDifficulty('medium');

  let bird, pipes, score, bestScore, gameOver, started;
  let soundEnabled = true;
  let audioCtx = null;

  const assets = {
    bg: null, base: null, pipe: null,
    bird0: null, bird1: null, bird2: null,
    gameover: null, message: null,
    nums: [],
  };
  const audioFiles = {};

  function loadImage(src) {
    return new Promise(function(resolve) {
      const img = new Image();
      img.onload = function() { resolve(img); };
      img.onerror = function() { console.warn('Failed to load:', src); resolve(null); };
      img.src = src;
    });
  }

  async function loadAssets() {
    const base = 'assets/';
    const [bg, baseImg, pipe, b0, b1, b2, go, msg] = await Promise.all([
      loadImage(base + 'background-day.png'),
      loadImage(base + 'base.png'),
      loadImage(base + 'pipe-green.png'),
      loadImage(base + 'yellowbird-downflap.png'),
      loadImage(base + 'yellowbird-midflap.png'),
      loadImage(base + 'yellowbird-upflap.png'),
      loadImage(base + 'gameover.png'),
      loadImage(base + 'message.png'),
    ]);
    assets.bg = bg;
    assets.base = baseImg;
    assets.pipe = pipe;
    assets.bird0 = b0;
    assets.bird1 = b1;
    assets.bird2 = b2;
    assets.gameover = go;
    assets.message = msg;

    for (let i = 0; i <= 9; i++) {
      assets.nums[i] = await loadImage(base + i + '.png');
    }
  }

  const sfx = {};
  function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    preloadSFX();
  }
  function preloadSFX() {
    const names = ['wing', 'point', 'hit', 'die', 'swoosh'];
    for (const name of names) {
      if (!sfx[name]) {
        const a = new Audio('assets/' + name + '.wav');
        a.volume = 0.5;
        sfx[name] = a;
      }
    }
  }
  function playSFX(name) {
    if (!soundEnabled) return;
    try {
      const a = sfx[name];
      if (a) {
        a.currentTime = 0;
        a.play().catch(function() {});
      }
    } catch(e) {}
  }

  let bgmNodes = [];
  function stopBGM() {
    for (const n of bgmNodes) { try { n.stop(); } catch(e) {} }
    bgmNodes = [];
  }
  const BGM_NOTES = [
    [262,0.18],[330,0.18],[392,0.18],[523,0.28],
    [392,0.12],[349,0.12],[330,0.18],[262,0.28],
    [294,0.18],[349,0.18],[440,0.18],[587,0.28],
    [440,0.12],[392,0.12],[349,0.18],[294,0.28],
    [262,0.18],[330,0.18],[392,0.18],[523,0.28],
    [392,0.12],[349,0.12],[330,0.18],[262,0.28],
    [330,0.12],[392,0.12],[523,0.18],[659,0.18],
    [523,0.12],[392,0.12],[330,0.18],[262,0.35],
  ];
  function playBGM() {
    if (!soundEnabled || !audioCtx) return;
    stopBGM();
    let t = audioCtx.currentTime + 0.1;
    for (const [f,d] of BGM_NOTES) {
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.type = 'square';
      o.frequency.setValueAtTime(f, t);
      g.gain.setValueAtTime(0.035, t);
      g.gain.setValueAtTime(0.035, t+d-0.04);
      g.gain.exponentialRampToValueAtTime(0.001, t+d);
      o.connect(g); g.connect(audioCtx.destination);
      o.start(t); o.stop(t+d);
      bgmNodes.push(o);
      t += d;
    }
  }

  function toggleSound() {
    soundEnabled = !soundEnabled;
    if (soundEnabled && started && !gameOver) { initAudio(); playBGM(); }
    else if (!soundEnabled) stopBGM();
  }

  function reset() {
    bird = { y: H/2, vy: 0, frame: 0, flapTime: 0 };
    pipes = [];
    score = 0; gameOver = false; started = false;
  }
  reset();
  bestScore = parseInt(localStorage.getItem('flappyBest') || '0');

  function addPipe() {
    const minY = 60, maxY = H - PIPE_GAP - 60;
    const topH = Math.floor(Math.random() * (maxY - minY + 1)) + minY;
    pipes.push({ x: W, topH, scored: false });
  }

  function flap() {
    initAudio();
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    if (gameOver) { stopBGM(); reset(); return; }
    if (!started) { started = true; if (soundEnabled) playBGM(); }
    bird.vy = FLAP;
    bird.flapTime = 8;
    playSFX('wing');
  }

  canvas.addEventListener('click', function(e) {
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left) * (W / rect.width);
    const my = (e.clientY - rect.top) * (H / rect.height);

    if (!started && !gameOver) {
      const btnW = 64, btnH = 22, gap = 8;
      const totalW = btnW * 3 + gap * 2;
      const startX = Math.floor((W - totalW) / 2);
      const btnY = Math.floor(H/2 + 30);
      const diffs = ['easy', 'medium', 'hard'];
      for (let i = 0; i < 3; i++) {
        const bx = startX + i * (btnW + gap);
        if (mx >= bx && mx <= bx + btnW && my >= btnY && my <= btnY + btnH) {
          applyDifficulty(diffs[i]);
          return;
        }
      }
    }
    flap();
  });

  document.addEventListener('keydown', function(e) {
    if (document.getElementById('flappyContainer').style.display === 'none') return;
    if (!started && !gameOver) {
      if (e.key === '1') { applyDifficulty('easy'); return; }
      if (e.key === '2') { applyDifficulty('medium'); return; }
      if (e.key === '3') { applyDifficulty('hard'); return; }
    }
    if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); flap(); }
  });

  function update() {
    if (!started || gameOver) return;

    bird.vy += GRAVITY;
    bird.y += bird.vy;
    bird.flapTime = Math.max(0, bird.flapTime - 1);

    bird.frame = (bird.frame + 1) % 30;
    const birdImg = bird.flapTime > 0 ? assets.bird2 : (bird.frame < 10 ? assets.bird0 : (bird.frame < 20 ? assets.bird1 : assets.bird2));

    const bh = birdImg ? birdImg.height : 24;
    if (bird.y + bh/2 > H - 16 || bird.y - bh/2 < 0) {
      gameOver = true; playSFX('hit');
      setTimeout(function() { playSFX('die'); }, 200);
      stopBGM();
      if (score > bestScore) { bestScore = score; localStorage.setItem('flappyBest', bestScore); }
      return;
    }

    if (pipes.length === 0 || pipes[pipes.length-1].x < W - 180) addPipe();

    for (let i = pipes.length-1; i >= 0; i--) {
      const p = pipes[i];
      p.x -= PIPE_SPEED;
      if (!p.scored && p.x + PIPE_W < BIRD_X) { p.scored = true; score++; playSFX('point'); }
      if (p.x + PIPE_W < 0) { pipes.splice(i,1); continue; }

      const bx = BIRD_X, by = bird.y;
      const br = 8;
      if (bx + br > p.x + 4 && bx - br < p.x + PIPE_W - 4) {
        if (by - br < p.topH || by + br > p.topH + PIPE_GAP) {
          gameOver = true; playSFX('hit');
          setTimeout(function() { playSFX('die'); }, 200);
          stopBGM();
          if (score > bestScore) { bestScore = score; localStorage.setItem('flappyBest', bestScore); }
          return;
        }
      }
    }
  }

  function drawNum(n, x, y, center) {
    const digits = String(n).split('');
    let totalW = 0, count = 0;
    for (const d of digits) {
      if (assets.nums[+d]) totalW += assets.nums[+d].width;
      else count++;
    }
    totalW += count * 14;
    let sx = center ? x - totalW/2 : x;
    for (const ch of digits) {
      const img = assets.nums[+ch];
      if (img) {
        const w = img.width, h = img.height;
        ctx.drawImage(img, 0, 0, w, h, Math.floor(sx), Math.floor(y), w, h);
        sx += w;
      } else {
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 28px monospace';
        ctx.textAlign = 'left';
        ctx.fillText(ch, Math.floor(sx), Math.floor(y + 24));
        sx += 14;
      }
    }
  }

  function draw() {
    if (assets.bg) {
      ctx.drawImage(assets.bg, 0, 0);
    } else {
      ctx.fillStyle = '#4DC9F6';
      ctx.fillRect(0, 0, W, H);
    }

    for (const p of pipes) {
      if (assets.pipe) {
        const ph = assets.pipe.height;
        ctx.save();
        ctx.translate(Math.floor(p.x) + PIPE_W/2, Math.floor(p.topH));
        ctx.scale(1, -1);
        ctx.drawImage(assets.pipe, -PIPE_W/2, 0, PIPE_W, ph);
        ctx.restore();
        ctx.drawImage(assets.pipe, Math.floor(p.x), Math.floor(p.topH + PIPE_GAP), PIPE_W, H - p.topH - PIPE_GAP - 16);
      }
    }

    if (assets.base) {
      const baseW = assets.base.width;
      const gx = Math.floor(Date.now() * 0.05) % baseW;
      ctx.drawImage(assets.base, gx, H - 16, baseW, assets.base.height);
      ctx.drawImage(assets.base, gx - baseW, H - 16, baseW, assets.base.height);
    } else {
      ctx.fillStyle = '#8BC34A';
      ctx.fillRect(0, H - 16, W, 16);
    }

    const birdImg = bird.flapTime > 0 ? assets.bird2 : (bird.frame < 10 ? assets.bird0 : (bird.frame < 20 ? assets.bird1 : assets.bird2));
    if (birdImg) {
      const bw = birdImg.width, bh = birdImg.height;
      ctx.save();
      ctx.translate(Math.floor(BIRD_X), Math.floor(bird.y));
      const rot = Math.min(Math.max(bird.vy * 0.04, -0.5), 0.5);
      ctx.rotate(rot);
      ctx.drawImage(birdImg, -Math.floor(bw/2), -Math.floor(bh/2));
      ctx.restore();
    } else {
      ctx.fillStyle = '#FFD54F';
      ctx.beginPath();
      ctx.ellipse(BIRD_X, bird.y, 12, 14, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    if (started && !gameOver) {
      drawNum(score, W/2, 35, true);
    }

    if (!started && !gameOver) {
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 14px Pixel, monospace';
      ctx.textAlign = 'center';
      ctx.fillText('High Score: ' + bestScore, Math.floor(W/2), H - 60);

      if (assets.message) {
        const mw = assets.message.width, mh = assets.message.height;
        ctx.drawImage(assets.message, Math.floor((W - mw)/2), Math.floor((H - mh)/2) - 20);
      } else {
        ctx.fillStyle = 'rgba(0,0,0,0.3)';
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 28px Pixel, monospace';
        ctx.textAlign = 'center';
        ctx.fillText('FLAPPY BIRD', Math.floor(W/2), Math.floor(H/2) - 40);
      }

      const btnW = 64, btnH = 22, gap = 8;
      const totalW = btnW * 3 + gap * 2;
      const startX = Math.floor((W - totalW) / 2);
      const btnY = Math.floor(H/2 + 30);
      const diffs = ['easy', 'medium', 'hard'];
      for (let i = 0; i < 3; i++) {
        const d = diffs[i];
        const bx = startX + i * (btnW + gap);
        const active = difficulty === d;
        ctx.fillStyle = active ? '#FFD54F' : 'rgba(255,255,255,0.2)';
        ctx.fillRect(bx, btnY, btnW, btnH);
        ctx.strokeStyle = active ? '#5D4037' : 'rgba(255,255,255,0.4)';
        ctx.lineWidth = 2;
        ctx.strokeRect(bx, btnY, btnW, btnH);
        ctx.fillStyle = active ? '#5D4037' : '#fff';
        ctx.font = 'bold 11px Pixel, monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(DIFFICULTIES[d].label, Math.floor(bx + btnW/2), Math.floor(btnY + btnH/2));
        ctx.textBaseline = 'alphabetic';
      }
      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      ctx.font = '12px Pixel, monospace';
      ctx.textAlign = 'center';
      ctx.fillText('Click or press Space', Math.floor(W/2), Math.floor(H/2 + 75));
    }
    if (gameOver) {
      if (assets.gameover) {
        const gw = assets.gameover.width, gh = assets.gameover.height;
        ctx.drawImage(assets.gameover, Math.floor((W - gw)/2), Math.floor((H - gh)/2) - 30);
      }
      const cardX = Math.floor(W/2 - 68), cardY = Math.floor(H/2 + 15);
      ctx.fillStyle = 'rgba(0,0,0,0.5)';

      ctx.textBaseline = 'alphabetic';
    }
  }

  function loop() { update(); draw(); requestAnimationFrame(loop); }

  loadAssets().finally(function() {
    preloadSFX();
    loop();
  });

  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'toggleSound') {
      soundEnabled = e.data.enabled;
      if (!soundEnabled) stopBGM();
      else if (started && !gameOver) { initAudio(); playBGM(); }
    }
    if (e.data && e.data.type === 'closeGame') {
      stopBGM();
    }
  });
})();

<script>
(function() {
  let statusText = 'Lượt của bạn (X)';
  let soundEnabled = true;
  const canvas = document.getElementById('caroCanvas');
  const ctx = canvas.getContext('2d');

  let SIZE = 20, WIN = 5, CELL = 28;
  let BOARD, PADDING = 24, W, H;
  let board = [];
  let currentPlayer = 1;
  let gameOver = false;
  let winner = null;
  let thinking = false;
  let audioCtx = null;
  const EMPTY = 0, PLAYER = 1, AI = -1;

  let isMultiplayer = false;
  let myPlayerNum = 1;
  let waitingForMove = false;
  let gameStarted = false;

  /* ---- Trystero (P2P) ---- */
  let room = null, moveAction = null, startAction = null;
  let connectionTimer = null;

  function resetJoinUI() {
    var btn = document.getElementById('caroConnectBtn');
    if (btn) { btn.textContent = 'Kết nối'; btn.disabled = false; }
  }

  function checkWebRTCSupport() {
    if (typeof RTCPeerConnection !== 'undefined') return true;
    var ua = navigator.userAgent || '';
    var isWebView = /Discord|FBAN|FBAV|Instagram|TikTok|Line|WeChat|Telegram|Snapchat|WebView|wv/i.test(ua);
    if (isWebView) {
      throw new Error('Trình duyệt trong app không hỗ trợ WebRTC. Hãy mở link bằng Chrome/Safari/Firefox.');
    }
    throw new Error('Trình duyệt không hỗ trợ WebRTC. Vui lòng dùng Chrome/Firefox/Safari mới nhất.');
  }

  function initTrystero(code) {
    checkWebRTCSupport();
    const {joinRoom} = Trystero || window.Trystero;
    if (!joinRoom) throw new Error('Trystero chưa load. F5 thử lại.');
    room = joinRoom({appId: 'caro-game-hub'}, code);
    moveAction = room.makeAction('move');
    moveAction.onMessage = (data, {peerId}) => {
      if (isMultiplayer && board && data.r !== undefined && data.c !== undefined) {
        multiplayerMove(data.r, data.c, myPlayerNum === 1 ? 2 : 1);
      }
    };
    startAction = room.makeAction('start');
    startAction.onMessage = (data, {peerId}) => {
      if (!gameStarted && data.yourNum) {
        gameStarted = true;
        if (connectionTimer) { clearTimeout(connectionTimer); connectionTimer = null; }
        myPlayerNum = data.yourNum;
        initMultiplayerGame();
      }
    };
    return room;
  }

  function trysteroSend(data) {
    if (moveAction) moveAction.send(data);
  }
  function trysteroSendStart(data, target) {
    if (startAction) startAction.send(data, target ? {target} : undefined);
  }

  function showCaroScreen(id) {
    document.querySelectorAll('#caroMenu > div').forEach(function(d) { d.style.display = 'none'; });
    document.getElementById(id).style.display = '';
  }

  function startGame(size, win) {
    SIZE = size; WIN = win;
    CELL = SIZE <= 10 ? 48 : (SIZE <= 20 ? 28 : 22);
    PADDING = 24;
    BOARD = CELL * SIZE;
    W = BOARD + PADDING * 2;
    H = BOARD + PADDING * 2;
    canvas.width = W;
    canvas.height = H;
    document.getElementById('caroMenu').style.display = 'none';
    canvas.style.display = 'block';
    initGame();
  }

  // AI size buttons
  document.querySelectorAll('#caroSizeS .caro-size-btn[data-size]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      isMultiplayer = false;
      startGame(parseInt(btn.getAttribute('data-size')), parseInt(btn.getAttribute('data-win')));
      if (Math.random() < 0.5) {
        statusText = 'AI đi trước (O)...';
        draw();
        aiMove();
      } else {
        statusText = 'Lượt của bạn (X)';
        draw();
      }
    });
  });

  function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  function playTone(freq, dur, type, vol) {
    if (type === undefined) type = 'sine';
    if (vol === undefined) vol = 0.15;
    if (!soundEnabled) return;
    if (!audioCtx) return;
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type;
    o.frequency.setValueAtTime(freq, audioCtx.currentTime);
    g.gain.setValueAtTime(vol, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + dur);
  }
  function playNoise(dur, vol) {
    if (vol === undefined) vol = 0.04;
    if (!soundEnabled) return;
    if (!audioCtx) return;
    const bs = audioCtx.sampleRate * dur;
    const b = audioCtx.createBuffer(1, bs, audioCtx.sampleRate);
    const d = b.getChannelData(0);
    for (let i = 0; i < bs; i++) d[i] = Math.random() * 2 - 1;
    const s = audioCtx.createBufferSource();
    s.buffer = b;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(vol, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    s.connect(g); g.connect(audioCtx.destination);
    s.start();
  }
  function playPlace() {
    playTone(800, 0.08, 'sine', 0.12);
    playNoise(0.03, 0.03);
  }
  function playWin() {
    setTimeout(function() { playTone(523, 0.15, 'sine', 0.15); }, 0);
    setTimeout(function() { playTone(659, 0.15, 'sine', 0.15); }, 150);
    setTimeout(function() { playTone(784, 0.15, 'sine', 0.15); }, 300);
    setTimeout(function() { playTone(1047, 0.3, 'sine', 0.18); }, 450);
  }
  function playLose() {
    playTone(400, 0.2, 'sawtooth', 0.1);
    setTimeout(function() { playTone(300, 0.2, 'sawtooth', 0.1); }, 200);
    setTimeout(function() { playTone(200, 0.4, 'sawtooth', 0.12); }, 400);
  }

  function initGame() {
    board = Array.from({ length: SIZE }, function() { return Array(SIZE).fill(EMPTY); });
    currentPlayer = PLAYER;
    gameOver = false;
    winner = null;
    thinking = false;
    statusText = 'Lượt của bạn (X)';
  }

  function checkWin(r, c, player) {
    const dirs = [[1,0],[0,1],[1,1],[1,-1]];
    for (const [dr, dc] of dirs) {
      let count = 1;
      for (let d = -1; d <= 1; d += 2) {
        let nr = r + dr * d, nc = c + dc * d;
        while (nr >= 0 && nr < SIZE && nc >= 0 && nc < SIZE && board[nr][nc] === player) {
          count++;
          nr += dr * d;
          nc += dc * d;
        }
      }
      if (count >= WIN) return true;
    }
    return false;
  }

  function isFull() {
    for (let r = 0; r < SIZE; r++)
      for (let c = 0; c < SIZE; c++)
        if (board[r][c] === EMPTY) return false;
    return true;
  }

  function placeMove(r, c, player) {
    board[r][c] = player;
    playPlace();
    if (checkWin(r, c, player)) {
      gameOver = true;
      winner = player;
      if (isMultiplayer) {
        statusText = player === myPlayerNum ? 'Bạn thắng!' : 'Đối thủ thắng!';
        if (player === myPlayerNum) playWin(); else playLose();
      } else {
        if (player === PLAYER) { statusText = 'Bạn thắng!'; playWin(); }
        else { statusText = 'AI thắng!'; playLose(); }
      }
      return true;
    }
    if (isFull()) {
      gameOver = true;
      statusText = 'Hòa!';
      playTone(440, 0.3, 'sine', 0.1);
      return true;
    }
    return false;
  }

  const DIRECTIONS = [[1,0],[0,1],[1,1],[1,-1]];

  function analyzeDir(r, c, dr, dc, player) {
    let count = 0, open = 0;
    for (let d = 1; d < WIN; d++) {
      const nr = r + dr * d, nc = c + dc * d;
      if (nr < 0 || nr >= SIZE || nc < 0 || nc >= SIZE) break;
      if (board[nr][nc] === player) count++;
      else { if (board[nr][nc] === EMPTY) open++; break; }
    }
    for (let d = 1; d < WIN; d++) {
      const nr = r - dr * d, nc = c - dc * d;
      if (nr < 0 || nr >= SIZE || nc < 0 || nc >= SIZE) break;
      if (board[nr][nc] === player) count++;
      else { if (board[nr][nc] === EMPTY) open++; break; }
    }
    return { count, open };
  }

  function patScore(count, open) {
    if (count >= WIN) return 100000000;
    const w = WIN;
    if (w === 5) {
      if (count === 4) return open >= 2 ? 20000000 : (open === 1 ? 800000 : 10000);
      if (count === 3) return open >= 2 ? 150000 : (open === 1 ? 15000 : 500);
      if (count === 2) return open >= 2 ? 3000 : (open === 1 ? 300 : 20);
      if (count === 1) return open >= 2 ? 30 : (open === 1 ? 6 : 1);
    } else if (w === 4) {
      if (count === 3) return open >= 2 ? 20000000 : (open === 1 ? 800000 : 10000);
      if (count === 2) return open >= 2 ? 150000 : (open === 1 ? 15000 : 500);
      if (count === 1) return open >= 2 ? 3000 : (open === 1 ? 300 : 20);
    } else if (w === 3) {
      if (count === 2) return open >= 2 ? 20000000 : (open === 1 ? 800000 : 10000);
      if (count === 1) return open >= 2 ? 150000 : (open === 1 ? 15000 : 500);
    }
    return 0;
  }

  function cellThreat(r, c, player) {
    board[r][c] = player;
    const win = checkWin(r, c, player);
    board[r][c] = EMPTY;
    if (win) return 100;

    const w = WIN;
    let threat = 0;
    for (const [dr, dc] of DIRECTIONS) {
      const a = analyzeDir(r, c, dr, dc, player);
      if (w === 5 || w === 4) {
        if (a.count >= 4 && a.open >= 1) threat = Math.max(threat, 10);
        else if (a.count >= 3 && a.open >= 2) threat = Math.max(threat, 5);
      } else {
        if (a.count >= 2 && a.open >= 1) threat = Math.max(threat, 10);
        else if (a.count >= 1 && a.open >= 2) threat = Math.max(threat, 5);
      }
    }
    return threat;
  }

  function hasDoubleThreatMove(r, c, player) {
    board[r][c] = player;
    let threats = 0;
    const w = WIN;
    for (const [dr, dc] of DIRECTIONS) {
      const a = analyzeDir(r, c, dr, dc, player);
      if (w === 5 || w === 4) {
        if (a.count >= 3 && a.open >= 2) threats++;
        if (a.count >= 4 && a.open >= 1) threats += 2;
      } else {
        if (a.count >= 1 && a.open >= 2) threats++;
        if (a.count >= 2 && a.open >= 1) threats += 2;
      }
    }
    board[r][c] = EMPTY;
    return threats >= 2;
  }

  function heuristic(r, c) {
    let myScore = 0, oppScore = 0;
    for (const [dr, dc] of DIRECTIONS) {
      const a = analyzeDir(r, c, dr, dc, AI);
      const b = analyzeDir(r, c, dr, dc, PLAYER);
      myScore += patScore(a.count, a.open);
      oppScore += patScore(b.count, b.open);
    }
    return myScore * 1.2 + oppScore;
  }

  function getCandidates() {
    const list = [];
    const visited = new Set();
    for (let r = 0; r < SIZE; r++) {
      for (let c = 0; c < SIZE; c++) {
        if (board[r][c] !== EMPTY) continue;
        for (let dr = -2; dr <= 2; dr++) {
          for (let dc = -2; dc <= 2; dc++) {
            if (dr === 0 && dc === 0) continue;
            const nr = r + dr, nc = c + dc;
            if (nr >= 0 && nr < SIZE && nc >= 0 && nc < SIZE && board[nr][nc] !== EMPTY) {
              const key = r * SIZE + c;
              if (!visited.has(key)) { visited.add(key); list.push({ r, c, s: heuristic(r, c) }); }
            }
          }
        }
      }
    }
    list.sort(function(a, b) {
      const ta = cellThreat(a.r, a.c, AI) + cellThreat(a.r, a.c, PLAYER);
      const tb = cellThreat(b.r, b.c, AI) + cellThreat(b.r, b.c, PLAYER);
      if (ta !== tb) return tb - ta;
      return b.s - a.s;
    });
    return list;
  }

  function evaluateBoard() {
    let score = 0;
    for (let r = 0; r < SIZE; r++) {
      for (let c = 0; c < SIZE; c++) {
        if (board[r][c] === EMPTY) continue;
        for (const [dr, dc] of DIRECTIONS) {
          const a = analyzeDir(r, c, dr, dc, board[r][c]);
          if (board[r][c] === AI) score += patScore(a.count, a.open);
          else score -= patScore(a.count, a.open) * 1.1;
        }
      }
    }
    return score;
  }

  function getCandsFast() {
    const list = [];
    for (let r = 0; r < SIZE; r++) {
      for (let c = 0; c < SIZE; c++) {
        if (board[r][c] !== EMPTY) continue;
        for (let dr = -1; dr <= 1; dr++) {
          for (let dc = -1; dc <= 1; dc++) {
            if (dr === 0 && dc === 0) continue;
            const nr = r + dr, nc = c + dc;
            if (nr >= 0 && nr < SIZE && nc >= 0 && nc < SIZE && board[nr][nc] !== EMPTY) {
              list.push({ r, c }); dr = 2; dc = 2;
            }
          }
        }
      }
    }
    return list;
  }

  function orderMoves(cands) {
    for (const m of cands) {
      m.score = cellThreat(m.r, m.c, AI) + cellThreat(m.r, m.c, PLAYER);
    }
    cands.sort(function(a, b) { return b.score - a.score; });
  }

  function alphaBeta(depth, alpha, beta, isMax, maxDepth) {
    const player = isMax ? AI : PLAYER;

    if (depth <= 0) {
      return isMax ? evaluateBoard() : -evaluateBoard();
    }

    const cands = getCandsFast();
    if (cands.length === 0) return 0;

    orderMoves(cands);

    const maxW = SIZE <= 5 ? 14 : (SIZE <= 10 ? 12 : 10);
    const width = Math.min(
      depth >= maxDepth - 1 ? maxW : (depth >= maxDepth - 2 ? Math.floor(maxW * 0.7) : Math.floor(maxW * 0.5)),
      cands.length
    );

    if (isMax) {
      let best = -Infinity;
      for (let i = 0; i < width; i++) {
        const { r, c } = cands[i];
        board[r][c] = AI;
        if (checkWin(r, c, AI)) { board[r][c] = EMPTY; return 100000000 - (maxDepth - depth) * 10; }
        const v = alphaBeta(depth - 1, alpha, beta, false, maxDepth);
        board[r][c] = EMPTY;
        if (v > best) best = v;
        if (v > alpha) alpha = v;
        if (beta <= alpha) break;
      }
      return best;
    } else {
      let best = Infinity;
      for (let i = 0; i < width; i++) {
        const { r, c } = cands[i];
        board[r][c] = PLAYER;
        if (checkWin(r, c, PLAYER)) { board[r][c] = EMPTY; return -100000000 + (maxDepth - depth) * 10; }
        const v = alphaBeta(depth - 1, alpha, beta, true, maxDepth);
        board[r][c] = EMPTY;
        if (v < best) best = v;
        if (v < beta) beta = v;
        if (beta <= alpha) break;
      }
      return best;
    }
  }

  function iterativeDeepening(timeLimitMs) {
    const start = performance.now();
    const candidates = getCandidates();
    if (candidates.length === 0) return null;

    let bestMove = candidates[0];
    let bestScore = -Infinity;
    const maxDepthLimit = SIZE <= 5 ? 10 : (SIZE <= 10 ? 6 : 4);

    for (let depth = 3; depth <= maxDepthLimit; depth++) {
      let currentBest = null;
      let currentScore = -Infinity;

      const maxW = SIZE <= 5 ? 14 : (SIZE <= 10 ? 12 : 10);
      const width = Math.min(depth <= 4 ? maxW : (depth <= 6 ? Math.floor(maxW * 0.7) : Math.floor(maxW * 0.5)), candidates.length);

      for (let i = 0; i < width; i++) {
        const { r, c } = candidates[i];
        board[r][c] = AI;
        const score = alphaBeta(depth - 1, -Infinity, Infinity, false, depth);
        board[r][c] = EMPTY;

        if (score > currentScore) {
          currentScore = score;
          currentBest = { r, c };
        }

        if (performance.now() - start > timeLimitMs) { depth = 999; break; }
      }

      if (depth < 999) {
        if (currentBest) { bestMove = currentBest; bestScore = currentScore; }
        if (currentScore >= 99000000) break;
      }

      if (performance.now() - start > timeLimitMs) break;
    }

    return bestMove;
  }

  function aiMove() {
    if (gameOver || thinking) return;
    thinking = true;
    statusText = 'AI đang suy nghĩ...';

    setTimeout(function() {
      if (gameOver) { thinking = false; return; }

      var emptyCount = 0;
      for (var ri = 0; ri < SIZE; ri++)
        for (var ci = 0; ci < SIZE; ci++)
          if (board[ri][ci] === EMPTY) emptyCount++;

      if (emptyCount === SIZE * SIZE) { placeMove(Math.floor(SIZE/2), Math.floor(SIZE/2), AI); doneAI(); return; }
      if (emptyCount === SIZE * SIZE - 1) {
        if (board[Math.floor(SIZE/2)][Math.floor(SIZE/2)] === EMPTY) { placeMove(Math.floor(SIZE/2), Math.floor(SIZE/2), AI); doneAI(); return; }
        for (var di = -1; di <= 1; di++)
          for (var ei = -1; ei <= 1; ei++) {
            var nr2 = Math.floor(SIZE/2) + di, nc2 = Math.floor(SIZE/2) + ei;
            if (nr2 >= 0 && nr2 < SIZE && nc2 >= 0 && nc2 < SIZE && board[nr2][nc2] === EMPTY) { placeMove(nr2, nc2, AI); doneAI(); return; }
          }
      }

      for (const { r, c } of getCandidates()) {
        board[r][c] = AI;
        if (checkWin(r, c, AI)) { board[r][c] = EMPTY; placeMove(r, c, AI); doneAI(); return; }
        board[r][c] = EMPTY;
      }

      for (const { r, c } of getCandidates()) {
        board[r][c] = PLAYER;
        if (checkWin(r, c, PLAYER)) { board[r][c] = EMPTY; placeMove(r, c, AI); doneAI(); return; }
        board[r][c] = EMPTY;
      }

      var timeLimit = Math.max(500, Math.min(2000, emptyCount * 2));
      var best = iterativeDeepening(timeLimit);

      if (best) {
        placeMove(best.r, best.c, AI);
      }
      doneAI();
    }, 50);
  }

  function doneAI() {
    if (!gameOver) {
      currentPlayer = PLAYER;
      statusText = 'Lượt của bạn (X)';
    }
    thinking = false;
    draw();
  }

  /* ---- Multiplayer ---- */
  function multiplayerMove(r, c, player) {
    const ended = placeMove(r, c, player);
    draw();
    if (!ended) {
      waitingForMove = false;
      currentPlayer = myPlayerNum;
      statusText = 'Lượt của bạn (' + (myPlayerNum === 1 ? 'X' : 'O') + ')';
      draw();
    }
  }

  function initMultiplayerGame() {
    SIZE = 20; WIN = 5;
    CELL = SIZE <= 10 ? 48 : (SIZE <= 20 ? 28 : 22);
    PADDING = 24;
    BOARD = CELL * SIZE;
    W = BOARD + PADDING * 2;
    H = BOARD + PADDING * 2;
    canvas.width = W;
    canvas.height = H;
    document.getElementById('caroMenu').style.display = 'none';
    canvas.style.display = 'block';
    initGame();

    if (myPlayerNum === 1) {
      waitingForMove = false;
      currentPlayer = PLAYER;
      statusText = 'Lượt của bạn (X) - Bạn đi trước';
      draw();
    } else {
      waitingForMove = true;
      currentPlayer = 0;
      statusText = 'Chờ đối thủ đi (X)...';
      draw();
    }
  }

  function createTrysteroGame() {
    var code = Math.random().toString(36).substring(2, 8).toUpperCase();
    document.getElementById('caroCodeDisplay').textContent = 'Đang kết nối...';
    try {
      isMultiplayer = true;
      initTrystero(code);
      document.getElementById('caroCodeDisplay').textContent = code;
      if (connectionTimer) clearTimeout(connectionTimer);
      connectionTimer = setTimeout(function() {
        if (!gameStarted && isMultiplayer && !gameOver) {
          document.getElementById('caroWaitMsg').textContent = 'Không có ai kết nối. Hủy và thử lại!';
          document.getElementById('caroWaitMsg').style.color = '#e53935';
        }
      }, 45000);
      room.onPeerJoin = function(peerId) {
        if (!gameStarted) {
          if (connectionTimer) { clearTimeout(connectionTimer); connectionTimer = null; }
          gameStarted = true;
          myPlayerNum = 1;
          trysteroSendStart({yourNum: 2}, peerId);
          initMultiplayerGame();
        }
      };
      room.onPeerLeave = function(peerId) {
        if (isMultiplayer && !gameOver) {
          statusText = 'Đối thủ đã thoát!';
          gameOver = true;
          draw();
        }
      };
    } catch(e) {
      var errMsg = e.message || 'Lỗi không xác định';
      var proto = location.protocol;
      if (typeof RTCPeerConnection === 'undefined') {
        errMsg += '\n\nprotocol: ' + proto;
        errMsg += '\n\n👉 Mở link bằng Chrome/Safari/Firefox thay vì trong app Discord!';
      }
      document.getElementById('caroCodeDisplay').style.color = '#e53935';
      document.getElementById('caroCodeDisplay').style.fontSize = '20px';
      document.getElementById('caroCodeDisplay').style.whiteSpace = 'pre-line';
      document.getElementById('caroCodeDisplay').textContent = errMsg;
    }
  }

  document.getElementById('caroCreateBtn').addEventListener('click', function() {
    showCaroScreen('caroCreate');
    createTrysteroGame();
  });

  document.getElementById('caroCancelCreate').addEventListener('click', function() {
    room = null; moveAction = null; startAction = null;
    if (connectionTimer) { clearTimeout(connectionTimer); connectionTimer = null; }
    isMultiplayer = false; gameStarted = false;
    showCaroScreen('caroOnline');
  });

  document.getElementById('caroJoinBtn').addEventListener('click', function() { showCaroScreen('caroJoin'); });
  document.getElementById('caroBackOnline').addEventListener('click', function() { window.dispatchEvent(new KeyboardEvent('keydown', { key: 'Escape' })); });
  document.getElementById('caroBackJoin').addEventListener('click', function() {
    if (connectionTimer) { clearTimeout(connectionTimer); connectionTimer = null; }
    room = null; moveAction = null; startAction = null;
    isMultiplayer = false; gameStarted = false;
    resetJoinUI();
    document.getElementById('caroJoinError').style.display = 'none';
    showCaroScreen('caroOnline');
  });

  document.getElementById('caroConnectBtn').addEventListener('click', function() {
    var code = document.getElementById('caroCodeInput').value.trim().toUpperCase();
    if (!code) { document.getElementById('caroJoinError').style.display = ''; document.getElementById('caroJoinError').textContent = 'Nhập mã trận!'; return; }
    document.getElementById('caroJoinError').style.display = 'none';
    try {
      initTrystero(code);
      isMultiplayer = true;
      document.getElementById('caroConnectBtn').textContent = 'Đang kết nối...';
      document.getElementById('caroConnectBtn').disabled = true;
      document.getElementById('caroJoinError').style.display = '';
      document.getElementById('caroJoinError').style.color = '#FFD54F';
      document.getElementById('caroJoinError').textContent = 'Đang tìm đối thủ... (mã: ' + code + ')';
      if (connectionTimer) clearTimeout(connectionTimer);
      connectionTimer = setTimeout(function() {
        if (!gameStarted && isMultiplayer && !gameOver) {
          document.getElementById('caroJoinError').style.color = '#e53935';
          document.getElementById('caroJoinError').textContent = 'Không tìm thấy đối thủ. Thử lại!';
          resetJoinUI();
        }
      }, 30000);
      room.onPeerLeave = function(peerId) {
        if (isMultiplayer && !gameOver) {
          statusText = 'Đối thủ đã thoát!';
          gameOver = true;
          draw();
        }
      };
    } catch(e) {
      document.getElementById('caroJoinError').style.display = '';
      document.getElementById('caroJoinError').style.color = '#e53935';
      document.getElementById('caroJoinError').textContent = 'Lỗi: ' + e.message;
      return;
    }
  });

  document.getElementById('caroCodeInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') document.getElementById('caroConnectBtn').click();
  });

  function draw() {
    ctx.clearRect(0, 0, W, H);

    ctx.fillStyle = '#F5E6CA';
    ctx.fillRect(0, 0, W, H);

    ctx.fillStyle = '#333';
    ctx.font = 'bold 14px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillText(statusText, Math.floor(W/2), 4);
    ctx.textBaseline = 'alphabetic';

    ctx.strokeStyle = '#C4A97D';
    ctx.lineWidth = 3;
    ctx.strokeRect(PADDING - 4, PADDING - 4, BOARD + 8, BOARD + 8);

    ctx.strokeStyle = '#A0825A';
    ctx.lineWidth = 1;
    for (let i = 0; i <= SIZE; i++) {
      const pos = PADDING + i * CELL;
      ctx.beginPath();
      ctx.moveTo(PADDING, pos);
      ctx.lineTo(PADDING + BOARD, pos);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(pos, PADDING);
      ctx.lineTo(pos, PADDING + BOARD);
      ctx.stroke();
    }

    if (SIZE >= 15) {
      const step = Math.floor(SIZE / 2);
      const stars = [];
      for (let i = step; i < SIZE; i += step) {
        for (let j = step; j < SIZE; j += step) {
          const isEdge = (i === step || i === SIZE - step) && (j === step || j === SIZE - step);
          if (isEdge || SIZE <= 19) stars.push([i, j]);
        }
      }
      ctx.fillStyle = '#A0825A';
      for (const [r, c] of stars) {
        const x = PADDING + (c + 0.5) * CELL, y = PADDING + (r + 0.5) * CELL;
        ctx.beginPath();
        ctx.arc(x, y, 4, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    const half = CELL / 2 - 4;
    for (let r = 0; r < SIZE; r++) {
      for (let c = 0; c < SIZE; c++) {
        if (board[r][c] === EMPTY) continue;
        const x = PADDING + (c + 0.5) * CELL, y = PADDING + (r + 0.5) * CELL;
        if (board[r][c] === PLAYER) {
          ctx.strokeStyle = '#e53935';
          ctx.lineWidth = 3;
          ctx.shadowColor = 'rgba(0,0,0,0.15)';
          ctx.shadowBlur = 3;
          ctx.beginPath();
          ctx.moveTo(x - half, y - half);
          ctx.lineTo(x + half, y + half);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(x + half, y - half);
          ctx.lineTo(x - half, y + half);
          ctx.stroke();
          ctx.shadowBlur = 0;
        } else {
          ctx.strokeStyle = '#2E7D32';
          ctx.lineWidth = 3;
          ctx.shadowColor = 'rgba(0,0,0,0.15)';
          ctx.shadowBlur = 3;
          ctx.beginPath();
          ctx.arc(x, y, half - 1, 0, Math.PI * 2);
          ctx.stroke();
          ctx.shadowBlur = 0;
        }
      }
    }

    let lastR = -1, lastC = -1;
    for (let r = 0; r < SIZE; r++)
      for (let c = 0; c < SIZE; c++)
        if (board[r][c] !== EMPTY) { lastR = r; lastC = c; }
    if (lastR >= 0) {
      const x = PADDING + (lastC + 0.5) * CELL, y = PADDING + (lastR + 0.5) * CELL;
      ctx.strokeStyle = '#FFD700';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(x, y, 5, 0, Math.PI * 2);
      ctx.stroke();
    }

    if (gameOver) {
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.fillRect(0, 0, W, H);
      const bx = Math.floor(W/2 - 70), by = Math.floor(H/2 + 80);
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      ctx.fillRect(bx, by, 140, 36);
      ctx.strokeStyle = 'rgba(255,255,255,0.5)';
      ctx.lineWidth = 2;
      ctx.strokeRect(bx, by, 140, 36);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 16px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('Chơi lại', Math.floor(W/2), by + 18);
      ctx.textBaseline = 'alphabetic';
    }
  }

  canvas.addEventListener('click', function(e) {
    initAudio();
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left) * (W / rect.width);
    const my = (e.clientY - rect.top) * (H / rect.height);

    if (gameOver) {
      const bx = Math.floor(W/2 - 70), by = Math.floor(H/2 + 80);
      if (mx >= bx && mx <= bx + 140 && my >= by && my <= by + 36) {
        if (isMultiplayer) {
          room = null; moveAction = null; startAction = null; isMultiplayer = false; gameStarted = false;
          document.getElementById('caroMenu').style.display = '';
          document.getElementById('caroCanvas').style.display = 'none';
          showCaroScreen('caroOnline');
        } else {
          initGame();
          if (Math.random() < 0.5) {
            statusText = 'AI đi trước (O)...';
            draw();
            aiMove();
          } else {
            statusText = 'Lượt của bạn (X)';
            draw();
          }
        }
        return;
      }
      return;
    }

    if (isMultiplayer) {
      if (waitingForMove || currentPlayer !== myPlayerNum) return;
    } else {
      if (thinking || currentPlayer !== PLAYER) return;
    }
    const c = Math.floor((mx - PADDING) / CELL);
    const r = Math.floor((my - PADDING) / CELL);
    if (r < 0 || r >= SIZE || c < 0 || c >= SIZE) return;
    if (board[r][c] !== EMPTY) return;

    if (isMultiplayer) {
      const ended = placeMove(r, c, myPlayerNum);
      draw();
      if (!ended) {
        trysteroSend({ r: r, c: c });
        waitingForMove = true;
        currentPlayer = 0;
        statusText = 'Đang chờ đối thủ...';
        draw();
      }
    } else {
      const end = placeMove(r, c, PLAYER);
      draw();
      if (!end) {
        currentPlayer = AI;
        aiMove();
      }
    }
  });

  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'toggleSound') {
      soundEnabled = e.data.enabled;
    }
  });
})();
</script>
